name: Create GitHub Release on tag push

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Verify tag format vINTEGER.INTEGER.INTEGER
        id: verify_tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag '$TAG' does not match vINTEGER.INTEGER.INTEGER (e.g., v1.2.3). Skipping release."
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        if: ${{ steps.verify_tag.outputs.valid == 'true' }}
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
